<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <title>情報科発表会</title>
    <meta name="description" content="第9回新宿山吹高校情報科発表会 特設サイト" />

    <meta property="og:title" content="情報科発表会" />
    <meta property="og:description" content="第9回新宿山吹高校情報科発表会 特設サイト" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yamabuki.work/" />
    <meta property="og:image" content="https://yamabuki.work/ogp-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="情報科発表会" />
    <meta name="twitter:description" content="第9回新宿山吹高校情報科発表会 特設サイト" />
    <meta name="twitter:image" content="https://yamabuki.work/ogp-image.png" />
    <meta name="theme-color" id="themeColorMeta" content="#fafaf8" />
  </head>
  <body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 selection:bg-slate-400/30 dark:selection:bg-slate-700/30 antialiased">
    <div id="root"></div>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme-preference');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const isDark = storedTheme === 'dark' || (
          (storedTheme === 'system' || !storedTheme) && mediaQuery.matches
        );
        
        document.documentElement.classList.toggle('dark', isDark);
        const metaTag = document.getElementById('themeColorMeta');
        if (metaTag) {
          metaTag.setAttribute('content', isDark ? '#0f172a' : '#fafaf8');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
