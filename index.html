    <meta name="theme-color" id="themeColorMeta" content="#fafaf8" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://yamabuki.work/",
        "name": "第9回 新宿山吹高校情報科発表会",
        "alternateName": "新宿山吹高校情報科発表会",
        "description": "2026年3月13日(金)開催、第9回 新宿山吹高校情報科発表会の特設サイトです。当日のタイムテーブルや、生徒による発表の概要を掲載しています。"
      }
    </script>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme-preference');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const isDark = storedTheme === 'dark' || (
          (storedTheme === 'system' || !storedTheme) && mediaQuery.matches
        );

        document.documentElement.classList.toggle('dark', isDark);
        document.getElementById('themeColorMeta')?.setAttribute(
          'content',
          isDark ? '#0f172a' : '#fafaf8'
        );
      })();
    </script>
